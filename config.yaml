# VITS2 Configuration
# ────────────────────────────────────────────────────────────────────────────
# Full VITS2 end-to-end TTS + ECAPA-TDNN voice cloning configuration.

system:
  device: "auto"           # auto | cpu | cuda | mps
  cache_dir: "./cache"
  log_level: "INFO"
  max_workers: 4

# ── Model ────────────────────────────────────────────────────────────────────
model:
  type: "VITS2"
  params:
    # Vocabulary (IPA phonemes + special tokens)
    n_vocab: 512
    # Linear spectrogram channels (n_fft // 2 + 1)
    spec_channels: 513
    # Random segment length fed to decoder during training (samples)
    segment_size: 8192
    # Latent dimension
    inter_channels: 192
    # Transformer / WaveNet hidden size
    hidden_channels: 192
    # FFN / filter channels in transformer
    filter_channels: 768
    # Transformer attention heads
    n_heads: 2
    # Transformer encoder depth
    n_layers: 6
    # FFN kernel size
    kernel_size: 3
    p_dropout: 0.1

    # HiFi-GAN generator
    resblock: "1"
    resblock_kernel_sizes: [3, 7, 11]
    resblock_dilation_sizes: [[1, 3, 5], [1, 3, 5], [1, 3, 5]]
    upsample_rates: [8, 8, 2, 2]           # total hop = 256
    upsample_initial_channel: 512
    upsample_kernel_sizes: [16, 16, 4, 4]

    # Multi-speaker / voice-cloning
    n_speakers: 0           # 0 = single-speaker without lookup table
    gin_channels: 256       # speaker embedding projected to this dim
    use_sdp: true           # Stochastic Duration Predictor (flow-based)

# ── Speaker Encoder (ECAPA-TDNN) ─────────────────────────────────────────────
speaker_encoder:
  channels: 1024
  emb_dim: 192
  sample_rate: 16000        # ECAPA-TDNN expects 16 kHz input
  checkpoint_path: null     # path to pretrained ECAPA-TDNN weights (optional)

# ── Data ─────────────────────────────────────────────────────────────────────
data:
  train_path: "data/train/"
  val_path:   "data/val/"
  test_path:  "data/test/"
  sample_rate: 22050
  n_fft: 1024
  hop_length: 256
  win_length: 1024
  n_mel_channels: 80
  mel_fmin: 0.0
  mel_fmax: 8000.0
  max_wav_length: 220500    # 10 s at 22050 Hz
  normalize_audio: true
  trim_silence: true
  use_augmentation: false   # enable for training with more diversity

# ── Training ─────────────────────────────────────────────────────────────────
training:
  batch_size: 8             # increase if VRAM allows (16 for 24 GB)
  epochs: 1000
  learning_rate: 2.0e-4
  save_every: 10
  validate_every: 1
  output_dir: "./outputs"
  grad_clip_norm: 1.0

# ── Text Processor ───────────────────────────────────────────────────────────
text_processing:
  language: "en"
  use_phonemes: true
  phoneme_backend: "espeak"  # espeak | festival
  add_blank: true
  normalize_numbers: true
  normalize_abbreviations: true

# ── Voice Cloning ────────────────────────────────────────────────────────────
voice_cloning:
  min_reference_length: 3.0  # seconds
  max_reference_length: 30.0
  similarity_threshold: 0.7
  noise_scale: 0.667
  noise_scale_w: 0.8
  length_scale: 1.0

# ── Monitoring ───────────────────────────────────────────────────────────────
monitoring:
  enable_wandb: false
  wandb_project: "vits2-tts"
  enable_tensorboard: true
  tensorboard_log_dir: "./logs"

# ── Performance ──────────────────────────────────────────────────────────────
performance:
  enable_fp16: true          # AMP — requires CUDA
  enable_caching: true
  cache_size: 1000
  batch_inference: true
  max_batch_size: 8

# ── Web Interface ────────────────────────────────────────────────────────────
web:
  title: "VITS2 Neural TTS + Voice Cloning"
  description: "State-of-the-art end-to-end TTS with zero-shot voice cloning"
  max_text_length: 500
  max_audio_duration: 30
  enable_voice_cloning: true
  enable_multi_speaker: true

# ── API ──────────────────────────────────────────────────────────────────────
api:
  host: "0.0.0.0"
  port: 8000
  workers: 1
  max_request_size: 10485760
  request_timeout: 300
